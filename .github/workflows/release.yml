name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          node -e "
            const fs = require('fs');
            const path = 'frontend/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build desktop installer
        run: |
          cd frontend
          npm ci
          node ../scripts/build-desktop.cjs build1

      - name: Prepare release notes
        shell: bash
        run: |
          NOTES=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            cp "$NOTES" release-body.md
          else
            echo "Release ${GITHUB_REF_NAME}" > release-body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release-body.md
          files: |
            build1/TMAM Setup *.exe
