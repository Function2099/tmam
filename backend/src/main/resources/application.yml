server:
  port: 8899

spring:
  application:
    name: tmam-backend

tmam:
  mode: native
  config-path: ${user.home}/.tmam/projects.json
  instances-root: ${user.home}/.tmam/instances
  pids-root: ${user.home}/.tmam/pids
  # default-catalina-home:  # 選填；未設定時依 CATALINA_HOME 或本機掃描自動偵測
  server-xml-backup: ${user.home}/.tmam/backups/server.xml.tmam-original
  server-xml-fragments: ${user.home}/.tmam/server-fragments
  native-catalina-base: ${user.home}/.tmam/native-tomcat
  startup-timeout-sec: 90
  app-log-path: ${user.home}/.tmam/logs/tmam-backend.log
  nginx:
    enabled: true
    # executable:  # 選填；未設定時依 NGINX_HOME、PATH 或常見安裝路徑自動偵測
    config-path: ${user.home}/.tmam/nginx/nginx.conf
    locations-fragment: ${user.home}/.tmam/nginx/tmam-locations.conf
    listen-port: 80
    upstream-host: 127.0.0.1
    gateway-port: 8080
  path-gateway:
    service-name: PathGateway

logging:
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: ${tmam.app-log-path}
  level:
    com.tmam: DEBUG
